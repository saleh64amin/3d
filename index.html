<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <!-- component for zooming images on click -->
    <script>
      AFRAME.registerComponent('zoom-on-click', {
        init: function () {
          const scene = this.el.sceneEl;
          let overlay;

          function createOverlay() {
            // create a plane attached to the camera that will act as a fullscreen preview
            overlay = document.createElement('a-plane');
            overlay.setAttribute('id', 'zoom-overlay');
            overlay.setAttribute('position', '0 0 -0.5');
            // setup material with high quality
            overlay.setAttribute('material', 'shader: flat; transparent: true; magFilter: linear; minFilter: linearMipmapLinear;');
            overlay.setAttribute('visible', 'false');
            // hide when the user clicks the overlay
            overlay.addEventListener('click', function () {
              overlay.setAttribute('visible', 'false');
            });
            const cameraEl = scene.querySelector('[camera]');
            cameraEl.appendChild(overlay);
          }

          this.el.addEventListener('click', () => {
            if (!overlay) {
              createOverlay();
            }
            const src = this.el.getAttribute('src');
            // compute size so the plane exactly fills camera frustum
            const cameraEl = scene.querySelector('[camera]');
            const cam = cameraEl.getObject3D('camera');
            if (cam) {
              const distance = 0.5;
              const fov = cam.fov;
              const aspect = cam.aspect;
              const height = 2 * distance * Math.tan(THREE.Math.degToRad(fov / 2));
              const width = height * aspect;
              overlay.setAttribute('width', width);
              overlay.setAttribute('height', height);
            }
            // set the image and show the overlay
            overlay.setAttribute('material', 'src: ' + src + '; shader: flat;');
            overlay.setAttribute('visible', 'true');
          });
        }
      });
    </script>
</head>
<body>

  <a-scene>
    <a-sky color="#87CEEB"></a-sky> 

    <a-image id="image1" zoom-on-click src="photo_2026-03-07_21-54-13.jpg" position="0 1.6 -6" width="5" height="5" material="magFilter: linear; minFilter: linearMipmapLinear"></a-image>
    
    <a-image id="image2" zoom-on-click src="photo_2026-03-07_21-54-29.jpg" position="4.2 1.6 -4.2" rotation="0 -45 0" width="5" height="5" material="magFilter: linear; minFilter: linearMipmapLinear"></a-image>
    
    <a-image id="image3" zoom-on-click src="photo_2026-03-07_21-54-35.jpg" position="6 1.6 0" rotation="0 -90 0" width="5" height="5" material="magFilter: linear; minFilter: linearMipmapLinear"></a-image>
    
    <a-image id="image4" zoom-on-click src="photo_2026-03-07_21-54-41.jpg" position="4.2 1.6 4.2" rotation="0 -135 0" width="5" height="5" material="magFilter: linear; minFilter: linearMipmapLinear"></a-image>
    
    <a-image id="image5" zoom-on-click src="photo_2026-03-07_21-54-46.jpg" position="0 1.6 6" rotation="0 180 0" width="5" height="5" material="magFilter: linear; minFilter: linearMipmapLinear"></a-image>
    
    <a-image id="image6" zoom-on-click src="photo_2026-03-07_21-54-50.jpg" position="-4.2 1.6 4.2" rotation="0 135 0" width="5" height="5" material="magFilter: linear; minFilter: linearMipmapLinear"></a-image>
    
    <a-image id="image7" zoom-on-click src="photo_2026-03-07_21-54-13.jpg" position="-6 1.6 0" rotation="0 90 0" width="5" height="5" material="magFilter: linear; minFilter: linearMipmapLinear"></a-image>
    
    <a-image id="image8" zoom-on-click src="photo_2026-03-07_21-54-13.jpg" position="-4.2 1.6 -4.2" rotation="0 45 0" width="5" height="5" material="magFilter: linear; minFilter: linearMipmapLinear"></a-image>

    <a-image id="image9" src="photo_2026-03-07_21-54-13.jpg" position="0 7 0" rotation="90 0 0" width="5" height="5" material="magFilter: linear; minFilter: linearMipmapLinear"></a-image>

    <a-entity camera look-controls position="0 1.6 0">
      <a-cursor></a-cursor>
      <!-- instructions always visible to the viewer -->
      <a-entity position="0 -0.5 -1" text="value: اضغط على البوستر لتكبيره\Aسيملأ الشاشة بجودة عالية\Aاضغط على الصورة المكبرة للخروج; color: #000; width: 2.5; align: center;"></a-entity>
    </a-entity>
</a-scene>

</body>
</html>
