<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>معرض الصور الذكي</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

<style>

#fullscreen-zoom{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
z-index:9999;
justify-content:center;
align-items:center;
cursor:zoom-out;
}

#fullscreen-zoom img{
max-width:95%;
max-height:95%;
border:2px solid white;
}

.instruction{
position:fixed;
bottom:20px;
width:100%;
text-align:center;
color:white;
font-family:sans-serif;
z-index:100;
text-shadow:1px 1px 5px black;
}

.nav-links{
position:fixed;
bottom:80px;
width:100%;
text-align:center;
z-index:200;
direction:ltr;
}

.nav-links a{
display:inline-block;
background:#556B2F;
color:white;
padding:12px 24px;
margin:0 10px;
border-radius:40px;
text-decoration:none;
font-family:sans-serif;
font-weight:bold;
font-size:20px;
border:2px solid #6B8E23;
}

.nav-links a:hover{
background:#6B8E23;
}

</style>

<script>

AFRAME.registerComponent('zoom-logic',{

init:function(){

const overlay=document.getElementById("fullscreen-zoom");
const zoomImg=overlay.querySelector("img");

this.el.addEventListener("mousedown",()=>{

const src=this.el.getAttribute("src");
zoomImg.src=src;
overlay.style.display="flex";

});

this.el.addEventListener("touchstart",()=>{

const src=this.el.getAttribute("src");
zoomImg.src=src;
overlay.style.display="flex";

});

}

});

function closeZoom(){
document.getElementById("fullscreen-zoom").style.display="none";
}

</script>

</head>

<body>

<div class="instruction">
اضغط على الصورة لتكبيرها
</div>

<div class="nav-links">
<a href="1.html">1</a>
<a href="2.html">2</a>
</div>

<div id="fullscreen-zoom" onclick="closeZoom()">
<img src="">
</div>

<a-scene>

<a-sky color="#556B2F"></a-sky>

<a-entity light="type:ambient;intensity:1.5"></a-entity>


<a-image class="clickable" zoom-logic src="photo_2026-03-07_21-54-13.jpg" position="0 1.6 -5" width="3.5" height="3.5"></a-image>

<a-image class="clickable" zoom-logic src="photo_2026-03-07_21-54-29.jpg" position="3.5 1.6 -3.5" rotation="0 -45 0" width="3.5" height="3.5"></a-image>

<a-image class="clickable" zoom-logic src="photo_2026-03-07_21-54-35.jpg" position="5 1.6 0" rotation="0 -90 0" width="3.5" height="3.5"></a-image>

<a-image class="clickable" zoom-logic src="photo_2026-03-07_21-54-41.jpg" position="3.5 1.6 3.5" rotation="0 -135 0" width="3.5" height="3.5"></a-image>

<a-image class="clickable" zoom-logic src="photo_2026-03-07_21-54-46.jpg" position="0 1.6 5" rotation="0 180 0" width="3.5" height="3.5"></a-image>

<a-image class="clickable" zoom-logic src="photo_2026-03-07_21-54-50.jpg" position="-3.5 1.6 3.5" rotation="0 135 0" width="3.5" height="3.5"></a-image>

<a-image class="clickable" zoom-logic src="photo_2026-03-07_21-54-13.jpg" position="-5 1.6 0" rotation="0 90 0" width="3.5" height="3.5"></a-image>

<a-image class="clickable" zoom-logic src="photo_2026-03-07_21-54-29.jpg" position="-3.5 1.6 -3.5" rotation="0 45 0" width="3.5" height="3.5"></a-image>

<a-image class="clickable" zoom-logic src="photo_2026-03-07_21-54-13.jpg" position="0 6 0" rotation="90 0 0" width="4" height="4"></a-image>


<a-entity camera
look-controls="touchEnabled:true"
cursor="rayOrigin: mouse"
raycaster="objects: .clickable"
position="0 1.6 0">

<a-entity
geometry="primitive:ring;radiusInner:0.01;radiusOuter:0.015"
material="color:white"
position="0 0 -2">
</a-entity>

</a-entity>

</a-scene>

</body>
</html>
